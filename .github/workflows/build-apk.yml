name: Build Android APK (32+64 bit fast)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Prebuild Android
        run: npx expo prebuild --platform android --clean --no-install

      - name: Build APK (arm64-v8a + armeabi-v7a only)
        run: |
          cd android
          chmod +x gradlew
          # Build only the 2 most common architectures (covers 99% of devices)
          # This is ~4x faster than building all 4 architectures
          ./gradlew assembleRelease \
            --no-daemon \
            -PenableMinifyInReleaseBuilds=false \
            -Pandroid.injected.build.abi=arm64-v8a,armeabi-v7a
        env:
          GRADLE_OPTS: "-Xmx4g -XX:MaxMetaspaceSize=512m"

      - name: List APK files
        run: |
          echo "=== APK files ==="
          find android/app/build/outputs/apk -name "*.apk" -exec ls -lh {} \;
          echo "=== APK details ==="
          find android/app/build/outputs/apk -name "*.apk" | while read f; do
            echo "File: $f"
            file "$f" || true
            unzip -l "$f" | grep "lib/" | head -5 || true
          done

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: VibePlayRiko-APK
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 30
