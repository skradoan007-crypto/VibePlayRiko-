name: Build Android APK (VibePlayRiko)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Install dependencies
        run: npm install

      - name: Prebuild Android
        run: npx expo prebuild --platform android --clean --no-install

      - name: Build Debug APK (fast - no lint)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug \
            --no-daemon \
            -Pandroid.injected.build.abi=arm64-v8a,armeabi-v7a
        env:
          GRADLE_OPTS: "-Xmx4g -XX:MaxMetaspaceSize=512m -Dorg.gradle.daemon=false -Dorg.gradle.parallel=true"

      - name: Find and list APK files
        run: |
          echo "=== Searching for APK files ==="
          find . -name "*.apk" 2>/dev/null || true
          echo "=== APK build output dir ==="
          ls -la android/app/build/outputs/ 2>/dev/null || echo "No outputs dir found"
          ls -la android/app/build/outputs/apk/ 2>/dev/null || echo "No apk dir"
          ls -la android/app/build/outputs/apk/debug/ 2>/dev/null || echo "No debug dir"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: VibePlayRiko-Debug-APK
          path: android/app/build/intermediates/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 30
